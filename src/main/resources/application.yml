spring:
  application:
    name: secure-payment-system
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update  # auto-create/update tables (use 'validate' in production)
    show-sql: false  # set to true for debugging SQL queries
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20  # batch multiple SQL statements for performance
          fetch_size: 50
        order_inserts: true
        order_updates: true
  
  # DataSource Configuration - connects to MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/payment_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Connection Pool Configuration (HikariCP)
  hikari:
    maximum-pool-size: 10  # max connections in pool
    minimum-idle: 5  # min idle connections
    connection-timeout: 20000  # ms to wait for connection
    idle-timeout: 300000  # ms before closing idle connection
  
  # Jackson Configuration - JSON serialization
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Server Configuration
server:
  port: 8080

# Logging Configuration
logging:
  level:
    root: INFO
    com.payment: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# JWT Configuration
app:
  jwt:
    secret: your-secret-key-change-this-in-production-min-32-chars
    expiration: 86400000  # 24 hours in milliseconds
  name: Secure Payment System
  version: 1.0.0
  max-transaction-amount: 100000  # max transaction limit
  fraud-detection:
    enabled: true
    max-transactions-per-hour: 10  # flag if user makes more than 10 transactions/hour
    max-amount-per-hour: 500000  # flag if user transfers more than 500000/hour

---
# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION PROFILE - used when deployed on Render
#
# Activated via SPRING_PROFILES_ACTIVE=prod (set in render.yaml / dashboard env).
# Reads connection details from environment variables Render injects, so no
# secrets are hardcoded in this file. Falls back to local defaults if a var
# is missing, purely so the app doesn't crash on a typo during setup.
# ─────────────────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=require
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    com.payment: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

